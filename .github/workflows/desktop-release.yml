name: Release Desktop

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            platform: darwin-arm64
          - runner: ubuntu-latest
            platform: linux-amd64
          - runner: windows-latest
            platform: windows-amd64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache: true

      - uses: actions/setup-node@v6
        with:
          node-version: '26'

      - name: Install Wails 2.x
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev nsis

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Test
        run: go test ./...

      - name: Build Wails app (Linux)
        if: runner.os == 'Linux'
        run: go run github.com/wailsapp/wails/v2/cmd/wails@v2.12.0 build -clean -tags webkit2_41

      - name: Build Wails app
        if: runner.os != 'Linux'
        run: go run github.com/wailsapp/wails/v2/cmd/wails@v2.12.0 build -clean

      - name: Sign Windows binaries
        if: runner.os == 'Windows' && env.WINDOWS_SIGN_CERT != ''
        env:
          WINDOWS_SIGN_CERT: ${{ secrets.WINDOWS_SIGN_CERT }}
          WINDOWS_SIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERT_PASSWORD }}
        run: |
          $cert = [System.Convert]::FromBase64String($env:WINDOWS_SIGN_CERT)
          [System.IO.File]::WriteAllBytes("$env:RUNNER_TEMP\cert.pfx", $cert)
          Get-ChildItem -Recurse "build\bin" -Include "*.exe" | ForEach-Object {
            & signtool sign /f "$env:RUNNER_TEMP\cert.pfx" /p "$env:WINDOWS_SIGN_CERT_PASSWORD" /tr http://timestamp.digicert.com /td sha256 /fd sha256 $_.FullName
          }
          Remove-Item "$env:RUNNER_TEMP\cert.pfx"
        shell: pwsh

      # Package each platform into a uniquely named, uploadable asset. The macOS
      # output is a `.app` bundle (a directory) that cannot be a release asset on
      # its own, and the bare Linux/Windows binaries share the base name
      # "CashPilot Desktop" — so without per-platform packaging the release ends up
      # with a collision/missing binary (only Windows survived cleanly before).
      - name: Package release asset (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          tar -czf "dist/CashPilot-Desktop-${{ matrix.platform }}.tar.gz" -C build/bin "CashPilot Desktop"

      - name: Package release asset (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p dist
          app="$(find build/bin -maxdepth 1 -name '*.app' | head -1)"
          test -n "$app" || { echo "no .app bundle found in build/bin"; ls -la build/bin; exit 1; }
          ditto -c -k --keepParent "$app" "dist/CashPilot-Desktop-${{ matrix.platform }}.zip"

      - name: Package release asset (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "build\bin\CashPilot Desktop.exe" "dist\CashPilot-Desktop-${{ matrix.platform }}.exe"
        shell: pwsh

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}
          path: dist/*
          if-no-files-found: error

  publish:
    needs: build
    if: needs.build.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/desktop-*/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
