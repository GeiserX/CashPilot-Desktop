name: Release Desktop

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-sidecar:
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            sidecar_name: cashpilot-sidecar
          - os: macos-13
            target: x86_64-apple-darwin
            sidecar_name: cashpilot-sidecar
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_name: cashpilot-sidecar
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_name: cashpilot-sidecar.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: GeiserX/CashPilot
          path: CashPilot
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r sidecar/requirements.txt

      - name: Build sidecar
        env:
          CASHPILOT_BACKEND_PATH: ${{ github.workspace }}/CashPilot
        working-directory: sidecar
        run: |
          pyinstaller cashpilot-sidecar.spec

      - uses: actions/upload-artifact@v4
        with:
          name: sidecar-${{ matrix.target }}
          path: sidecar/dist/${{ matrix.sidecar_name }}

  build-tauri:
    needs: build-sidecar
    strategy:
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            sidecar_artifact: sidecar-aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
            sidecar_artifact: sidecar-x86_64-apple-darwin
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            sidecar_artifact: sidecar-x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_artifact: sidecar-x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.sidecar_artifact }}
          path: src-tauri/sidecar/

      - name: Make sidecar executable
        if: runner.os != 'Windows'
        run: chmod +x src-tauri/sidecar/cashpilot-sidecar

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Tauri CLI
        run: npm install

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx tauri build --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/**/*.deb

  publish:
    needs: build-tauri
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
