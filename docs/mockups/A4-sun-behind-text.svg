<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="25%" stop-color="#0a0018"/>
      <stop offset="45%" stop-color="#120028"/>
      <stop offset="60%" stop-color="#1a003a"/>
      <stop offset="100%" stop-color="#06060f"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="25%" stop-color="#fbbf24"/>
      <stop offset="45%" stop-color="#fb923c"/>
      <stop offset="65%" stop-color="#e11d48"/>
      <stop offset="85%" stop-color="#9f1239"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%">
      <stop offset="30%" stop-color="#fbbf24" stop-opacity="0.15"/>
      <stop offset="55%" stop-color="#fb923c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <clipPath id="sun-clip"><circle cx="600" cy="280" r="200"/></clipPath>
  </defs>

  <rect width="1200" height="800" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#fff">
    <circle cx="60" cy="30" r="1.3" opacity="0.9"/><circle cx="200" cy="70" r="0.7" opacity="0.5"/>
    <circle cx="380" cy="20" r="1" opacity="0.7"/><circle cx="1020" cy="40" r="1.1" opacity="0.6"/>
    <circle cx="1150" cy="60" r="0.8" opacity="0.5"/>
  </g>

  <!-- Sun (large, behind text, mid-window) -->
  <circle cx="600" cy="280" r="280" fill="url(#halo)"/>
  <circle cx="600" cy="280" r="200" fill="url(#sun)" opacity="0.5"/>
  <g clip-path="url(#sun-clip)">
    <rect x="395" y="280" width="410" height="5" fill="#06060f" opacity="0.7"/>
    <rect x="395" y="292" width="410" height="7" fill="#06060f" opacity="0.7"/>
    <rect x="395" y="306" width="410" height="9" fill="#06060f" opacity="0.7"/>
    <rect x="395" y="322" width="410" height="12" fill="#06060f" opacity="0.7"/>
    <rect x="395" y="342" width="410" height="16" fill="#06060f" opacity="0.7"/>
    <rect x="395" y="367" width="410" height="21" fill="#06060f" opacity="0.7"/>
    <rect x="395" y="398" width="410" height="28" fill="#06060f" opacity="0.7"/>
    <rect x="395" y="436" width="410" height="36" fill="#06060f" opacity="0.7"/>
    <!-- AIRPLANE -->
    <g transform="translate(600,200) rotate(27)">
      <path d="M0,-40 L4,-8 L44,3 L4,7 L6,17 L0,12 L-6,17 L-4,7 L-44,3 L-4,-8 Z"
            fill="#06060f" opacity="0.6"/>
    </g>
  </g>

  <!-- Content OVERLAID on the sun (text is on top of sun) -->
  <text x="600" y="300" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="46" font-weight="800" fill="#fff" text-anchor="middle" opacity="0.95">
    Welcome to CashPilot
  </text>
  <text x="600" y="345" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="16" fill="rgba(255,255,255,0.75)" text-anchor="middle">
    Passive income from your machine, effortlessly.
  </text>
  <text x="600" y="380" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="13" fill="rgba(255,255,255,0.5)" text-anchor="middle">
    Deploys and monitors bandwidth-sharing, DePIN, and compute services using Docker.
  </text>

  <rect x="510" y="410" rx="6" ry="6" width="180" height="46" fill="rgba(6,6,15,0.5)" stroke="#fb7185" stroke-width="1.5"/>
  <text x="600" y="439" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="15" font-weight="600" fill="#fff" text-anchor="middle">
    Get Started
  </text>

  <!-- Horizon below everything -->
  <rect x="0" y="490" width="1200" height="2" fill="#fb7185" opacity="0.5"/>

  <!-- Deep grid floor -->
  <g stroke="#8b5cf6" opacity="0.35">
    <line x1="0" y1="520" x2="1200" y2="520" stroke-width="0.6"/>
    <line x1="0" y1="560" x2="1200" y2="560" stroke-width="0.5"/>
    <line x1="0" y1="610" x2="1200" y2="610" stroke-width="0.5"/>
    <line x1="0" y1="670" x2="1200" y2="670" stroke-width="0.4"/>
    <line x1="0" y1="745" x2="1200" y2="745" stroke-width="0.3"/>
  </g>
  <g stroke="#fb7185" opacity="0.1">
    <line x1="600" y1="492" x2="0" y2="800" stroke-width="0.5"/>
    <line x1="600" y1="492" x2="200" y2="800" stroke-width="0.5"/>
    <line x1="600" y1="492" x2="400" y2="800" stroke-width="0.5"/>
    <line x1="600" y1="492" x2="600" y2="800" stroke-width="0.5"/>
    <line x1="600" y1="492" x2="800" y2="800" stroke-width="0.5"/>
    <line x1="600" y1="492" x2="1000" y2="800" stroke-width="0.5"/>
    <line x1="600" y1="492" x2="1200" y2="800" stroke-width="0.5"/>
  </g>

  <rect x="0" y="0" width="1200" height="2" fill="#fb7185" opacity="0.5"/>
  <rect x="0" y="798" width="1200" height="2" fill="#22d3ee" opacity="0.3"/>

  <text x="20" y="785" font-family="monospace" font-size="11" fill="#4a4a5a">
    A4: Large faded sun as background behind text. Content reads over the sun. Immersive layering.
  </text>
</svg>