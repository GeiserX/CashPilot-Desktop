<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a003a"/>
      <stop offset="15%" stop-color="#2d0055"/>
      <stop offset="30%" stop-color="#1a003a"/>
      <stop offset="50%" stop-color="#0d0022"/>
      <stop offset="100%" stop-color="#06060f"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="25%" stop-color="#fbbf24"/>
      <stop offset="45%" stop-color="#fb923c"/>
      <stop offset="65%" stop-color="#e11d48"/>
      <stop offset="85%" stop-color="#9f1239"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%">
      <stop offset="30%" stop-color="#fbbf24" stop-opacity="0.2"/>
      <stop offset="55%" stop-color="#fb923c" stop-opacity="0.1"/>
      <stop offset="80%" stop-color="#e11d48" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <clipPath id="sun-clip"><circle cx="600" cy="160" r="120"/></clipPath>
  </defs>

  <rect width="1200" height="800" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#fff">
    <circle cx="60" cy="20" r="1.1" opacity="0.7"/><circle cx="200" cy="40" r="0.7" opacity="0.4"/>
    <circle cx="1000" cy="25" r="1" opacity="0.6"/><circle cx="1140" cy="50" r="0.8" opacity="0.5"/>
    <circle cx="100" cy="100" r="0.5" opacity="0.2"/><circle cx="1100" cy="90" r="0.6" opacity="0.3"/>
  </g>

  <!-- Sun halo -->
  <circle cx="600" cy="160" r="200" fill="url(#halo)"/>

  <!-- SUN (top, partially cropped) -->
  <circle cx="600" cy="160" r="120" fill="url(#sun)"/>
  <g clip-path="url(#sun-clip)">
    <rect x="475" y="160" width="250" height="4" fill="#06060f"/>
    <rect x="475" y="170" width="250" height="5" fill="#06060f"/>
    <rect x="475" y="181" width="250" height="7" fill="#06060f"/>
    <rect x="475" y="194" width="250" height="9" fill="#06060f"/>
    <rect x="475" y="210" width="250" height="12" fill="#06060f"/>
    <rect x="475" y="230" width="250" height="16" fill="#06060f"/>
    <rect x="475" y="254" width="250" height="22" fill="#06060f"/>
    <!-- AIRPLANE -->
    <g transform="translate(600,118) rotate(27)">
      <path d="M0,-28 L2.5,-6 L30,2 L3,5.5 L4,12 L0,8.5 L-4,12 L-3,5.5 L-30,2 L-2.5,-6 Z"
            fill="#06060f" opacity="0.7"/>
    </g>
  </g>

  <!-- Horizon tight below sun -->
  <rect x="0" y="268" width="1200" height="3" fill="#fb7185" opacity="0.7"/>

  <!-- Everything packed above: sun + horizon + content + button all in top 55% -->
  <text x="600" y="340" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="40" font-weight="700" fill="#e4e4e7" text-anchor="middle">
    Welcome to CashPilot
  </text>
  <text x="600" y="378" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="15" fill="#a1a1aa" text-anchor="middle">
    Passive income from your machine, effortlessly.
  </text>
  <text x="600" y="410" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="13" fill="#71717a" text-anchor="middle">
    Deploys and monitors bandwidth-sharing, DePIN, and compute services using Docker.
  </text>

  <rect x="510" y="440" rx="6" ry="6" width="180" height="46" fill="#fb7185"/>
  <text x="600" y="469" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="15" font-weight="600" fill="#fff" text-anchor="middle">
    Get Started
  </text>

  <!-- Expansive grid floor (60% of window) -->
  <g stroke="#8b5cf6" opacity="0.4">
    <line x1="0" y1="300" x2="1200" y2="300" stroke-width="0.7"/>
    <line x1="0" y1="340" x2="1200" y2="340" stroke-width="0.6" opacity="0.2"/>
    <line x1="0" y1="520" x2="1200" y2="520" stroke-width="0.6"/>
    <line x1="0" y1="570" x2="1200" y2="570" stroke-width="0.5"/>
    <line x1="0" y1="630" x2="1200" y2="630" stroke-width="0.5"/>
    <line x1="0" y1="700" x2="1200" y2="700" stroke-width="0.4"/>
    <line x1="0" y1="780" x2="1200" y2="780" stroke-width="0.3"/>
  </g>
  <g stroke="#fb7185" opacity="0.12">
    <line x1="600" y1="271" x2="-100" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="271" x2="100" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="271" x2="250" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="271" x2="400" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="271" x2="600" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="271" x2="800" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="271" x2="950" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="271" x2="1100" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="271" x2="1300" y2="800" stroke-width="0.6"/>
  </g>

  <rect x="0" y="0" width="1200" height="2" fill="#fb7185" opacity="0.5"/>
  <rect x="0" y="798" width="1200" height="2" fill="#22d3ee" opacity="0.3"/>

  <text x="20" y="785" font-family="monospace" font-size="11" fill="#4a4a5a">
    A1: Everything packed in top half (sun → horizon → text → button). Grid stretches into distance below.
  </text>
</svg>