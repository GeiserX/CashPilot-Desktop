<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="25%" stop-color="#0d0022"/>
      <stop offset="40%" stop-color="#1a003a"/>
      <stop offset="50%" stop-color="#2d0055"/>
      <stop offset="100%" stop-color="#06060f"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="25%" stop-color="#fbbf24"/>
      <stop offset="45%" stop-color="#fb923c"/>
      <stop offset="65%" stop-color="#e11d48"/>
      <stop offset="85%" stop-color="#9f1239"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%">
      <stop offset="35%" stop-color="#fb923c" stop-opacity="0.2"/>
      <stop offset="65%" stop-color="#e11d48" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <clipPath id="sun-clip"><circle cx="600" cy="280" r="130"/></clipPath>
    <linearGradient id="reflect" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fb923c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="800" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#fff">
    <circle cx="80" cy="30" r="1.2" opacity="0.8"/><circle cx="220" cy="70" r="0.7" opacity="0.5"/>
    <circle cx="370" cy="20" r="1" opacity="0.7"/><circle cx="520" cy="55" r="0.8" opacity="0.4"/>
    <circle cx="680" cy="35" r="1.1" opacity="0.6"/><circle cx="840" cy="60" r="0.6" opacity="0.4"/>
    <circle cx="980" cy="25" r="1.2" opacity="0.7"/><circle cx="1120" cy="50" r="0.9" opacity="0.6"/>
  </g>

  <!-- HORIZON LINE (behind sun, just above first scan line) -->
  <rect x="0" y="277" width="1200" height="3" fill="#fb7185" opacity="0.8"/>
  <rect x="0" y="276" width="1200" height="1" fill="#fde68a" opacity="0.3"/>

  <!-- Sun halo -->
  <circle cx="600" cy="280" r="200" fill="url(#halo)"/>

  <!-- THE SUN (high, upper third) -->
  <circle cx="600" cy="280" r="130" fill="url(#sun)"/>
  <g clip-path="url(#sun-clip)">
    <rect x="465" y="280" width="270" height="4" fill="#06060f"/>
    <rect x="465" y="290" width="270" height="6" fill="#06060f"/>
    <rect x="465" y="302" width="270" height="8" fill="#06060f"/>
    <rect x="465" y="316" width="270" height="10" fill="#06060f"/>
    <rect x="465" y="333" width="270" height="13" fill="#06060f"/>
    <rect x="465" y="354" width="270" height="17" fill="#06060f"/>
    <rect x="465" y="380" width="270" height="22" fill="#06060f"/>
    <!-- AIRPLANE -->
    <g transform="translate(600,235) rotate(27)">
      <path d="M0,-30 L3,-6 L32,2.5 L3,5.5 L4.5,13 L0,9 L-4.5,13 L-3,5.5 L-32,2.5 L-3,-6 Z"
            fill="#06060f" opacity="0.7"/>
    </g>
  </g>

  <!-- Sun reflection -->
  <ellipse cx="600" cy="320" rx="90" ry="25" fill="url(#reflect)"/>

  <!-- Grid floor (starts from horizon at y=280) -->
  <g stroke="#8b5cf6" opacity="0.4">
    <line x1="0" y1="320" x2="1200" y2="320" stroke-width="0.7"/>
    <line x1="0" y1="365" x2="1200" y2="365" stroke-width="0.6"/>
    <line x1="0" y1="420" x2="1200" y2="420" stroke-width="0.6"/>
    <line x1="0" y1="485" x2="1200" y2="485" stroke-width="0.5"/>
    <line x1="0" y1="560" x2="1200" y2="560" stroke-width="0.5"/>
    <line x1="0" y1="650" x2="1200" y2="650" stroke-width="0.4"/>
    <line x1="0" y1="750" x2="1200" y2="750" stroke-width="0.4"/>
  </g>
  <g stroke="#fb7185" opacity="0.15">
    <line x1="600" y1="282" x2="-50" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="282" x2="150" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="282" x2="300" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="282" x2="450" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="282" x2="600" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="282" x2="750" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="282" x2="900" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="282" x2="1050" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="282" x2="1250" y2="800" stroke-width="0.6"/>
  </g>

  <!-- Content (below horizon, plenty of space) -->
  <text x="600" y="480" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="38" font-weight="700" fill="#e4e4e7" text-anchor="middle">
    Welcome to CashPilot
  </text>
  <text x="600" y="520" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="15" fill="#a1a1aa" text-anchor="middle">
    Passive income from your machine, effortlessly.
  </text>
  <text x="600" y="555" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="13" fill="#71717a" text-anchor="middle">
    Deploys and monitors bandwidth-sharing, DePIN, and compute services using Docker.
  </text>

  <rect x="510" y="590" rx="6" ry="6" width="180" height="46" fill="#fb7185"/>
  <text x="600" y="619" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="15" font-weight="600" fill="#fff" text-anchor="middle">
    Get Started
  </text>

  <rect x="0" y="0" width="1200" height="2" fill="#fb7185" opacity="0.5"/>
  <rect x="0" y="798" width="1200" height="2" fill="#22d3ee" opacity="0.3"/>

  <text x="20" y="785" font-family="monospace" font-size="11" fill="#4a4a5a">
    G1: Sun high, horizon at 48%, generous space for content below on grid floor.
  </text>
</svg>