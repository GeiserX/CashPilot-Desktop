<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="20%" stop-color="#0d0022"/>
      <stop offset="35%" stop-color="#1a003a"/>
      <stop offset="45%" stop-color="#2d0055"/>
      <stop offset="100%" stop-color="#06060f"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="25%" stop-color="#fbbf24"/>
      <stop offset="45%" stop-color="#fb923c"/>
      <stop offset="65%" stop-color="#e11d48"/>
      <stop offset="85%" stop-color="#9f1239"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%">
      <stop offset="35%" stop-color="#fb923c" stop-opacity="0.2"/>
      <stop offset="65%" stop-color="#e11d48" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <clipPath id="sun-clip"><circle cx="600" cy="210" r="110"/></clipPath>
  </defs>

  <rect width="1200" height="800" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#fff">
    <circle cx="80" cy="25" r="1.2" opacity="0.8"/><circle cx="250" cy="50" r="0.7" opacity="0.5"/>
    <circle cx="400" cy="18" r="1" opacity="0.7"/><circle cx="750" cy="40" r="0.9" opacity="0.6"/>
    <circle cx="1000" cy="30" r="1.1" opacity="0.7"/><circle cx="1150" cy="55" r="0.8" opacity="0.5"/>
  </g>

  <!-- Sun (compact, top third) -->
  <circle cx="600" cy="210" r="160" fill="url(#halo)"/>
  <circle cx="600" cy="210" r="110" fill="url(#sun)"/>
  <g clip-path="url(#sun-clip)">
    <rect x="485" y="210" width="230" height="3" fill="#06060f"/>
    <rect x="485" y="219" width="230" height="5" fill="#06060f"/>
    <rect x="485" y="229" width="230" height="6" fill="#06060f"/>
    <rect x="485" y="241" width="230" height="8" fill="#06060f"/>
    <rect x="485" y="255" width="230" height="11" fill="#06060f"/>
    <rect x="485" y="273" width="230" height="14" fill="#06060f"/>
    <rect x="485" y="295" width="230" height="18" fill="#06060f"/>
    <!-- AIRPLANE -->
    <g transform="translate(600,170) rotate(27)">
      <path d="M0,-26 L2.5,-5 L28,2 L3,5 L4,11 L0,8 L-4,11 L-3,5 L-28,2 L-2.5,-5 Z"
            fill="#06060f" opacity="0.7"/>
    </g>
  </g>

  <!-- HORIZON (high at ~38%) -->
  <rect x="0" y="305" width="1200" height="3" fill="#fb7185" opacity="0.8"/>
  <rect x="0" y="304" width="1200" height="1" fill="#fde68a" opacity="0.3"/>

  <!-- Grid (dense, deep perspective) -->
  <g stroke="#8b5cf6" opacity="0.4">
    <line x1="0" y1="335" x2="1200" y2="335" stroke-width="0.7"/>
    <line x1="0" y1="370" x2="1200" y2="370" stroke-width="0.6"/>
    <line x1="0" y1="410" x2="1200" y2="410" stroke-width="0.6"/>
    <line x1="0" y1="460" x2="1200" y2="460" stroke-width="0.5"/>
    <line x1="0" y1="520" x2="1200" y2="520" stroke-width="0.5"/>
    <line x1="0" y1="590" x2="1200" y2="590" stroke-width="0.4"/>
    <line x1="0" y1="680" x2="1200" y2="680" stroke-width="0.4"/>
    <line x1="0" y1="780" x2="1200" y2="780" stroke-width="0.3"/>
  </g>
  <g stroke="#fb7185" opacity="0.12">
    <line x1="600" y1="308" x2="-100" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="308" x2="100" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="308" x2="250" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="308" x2="400" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="308" x2="550" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="308" x2="650" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="308" x2="800" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="308" x2="950" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="308" x2="1100" y2="800" stroke-width="0.6"/>
    <line x1="600" y1="308" x2="1300" y2="800" stroke-width="0.6"/>
  </g>

  <!-- Content (center of the grid space, lots of room) -->
  <text x="600" y="440" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="42" font-weight="700" fill="#e4e4e7" text-anchor="middle">
    Welcome to CashPilot
  </text>
  <text x="600" y="480" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="15" fill="#a1a1aa" text-anchor="middle">
    Passive income from your machine, effortlessly.
  </text>
  <text x="600" y="515" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="13" fill="#71717a" text-anchor="middle">
    Deploys and monitors bandwidth-sharing, DePIN, and compute services using Docker.
  </text>

  <rect x="510" y="550" rx="6" ry="6" width="180" height="46" fill="#fb7185"/>
  <text x="600" y="579" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="15" font-weight="600" fill="#fff" text-anchor="middle">
    Get Started
  </text>

  <rect x="0" y="0" width="1200" height="2" fill="#fb7185" opacity="0.5"/>
  <rect x="0" y="798" width="1200" height="2" fill="#22d3ee" opacity="0.3"/>

  <text x="20" y="785" font-family="monospace" font-size="11" fill="#4a4a5a">
    G2: Sun compact at top, horizon at 38%. Maximum grid depth. Content centered in lower 60%.
  </text>
</svg>