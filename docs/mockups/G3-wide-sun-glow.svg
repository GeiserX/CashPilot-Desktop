<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="30%" stop-color="#0d0022"/>
      <stop offset="45%" stop-color="#1a003a"/>
      <stop offset="55%" stop-color="#2d0050"/>
      <stop offset="100%" stop-color="#06060f"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="25%" stop-color="#fbbf24"/>
      <stop offset="45%" stop-color="#fb923c"/>
      <stop offset="65%" stop-color="#e11d48"/>
      <stop offset="85%" stop-color="#9f1239"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%">
      <stop offset="30%" stop-color="#fbbf24" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#fb923c" stop-opacity="0.1"/>
      <stop offset="70%" stop-color="#e11d48" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="floor-glow" cx="50%" cy="0%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#8b5cf6" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <clipPath id="sun-clip"><circle cx="600" cy="300" r="150"/></clipPath>
  </defs>

  <rect width="1200" height="800" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#fff">
    <circle cx="60" cy="30" r="1.3" opacity="0.9"/><circle cx="180" cy="70" r="0.7" opacity="0.5"/>
    <circle cx="340" cy="20" r="1" opacity="0.7"/><circle cx="500" cy="55" r="0.8" opacity="0.4"/>
    <circle cx="700" cy="35" r="1.2" opacity="0.6"/><circle cx="860" cy="60" r="0.6" opacity="0.4"/>
    <circle cx="1020" cy="25" r="1.1" opacity="0.7"/><circle cx="1150" cy="45" r="0.9" opacity="0.6"/>
    <circle cx="120" cy="130" r="0.5" opacity="0.3"/><circle cx="1080" cy="110" r="0.6" opacity="0.3"/>
  </g>

  <!-- Wide sun halo (bleeds atmosphere) -->
  <circle cx="600" cy="300" r="280" fill="url(#halo)"/>

  <!-- THE SUN (large, wide presence) -->
  <circle cx="600" cy="300" r="150" fill="url(#sun)"/>
  <g clip-path="url(#sun-clip)">
    <rect x="445" y="300" width="310" height="5" fill="#06060f"/>
    <rect x="445" y="312" width="310" height="7" fill="#06060f"/>
    <rect x="445" y="326" width="310" height="9" fill="#06060f"/>
    <rect x="445" y="342" width="310" height="12" fill="#06060f"/>
    <rect x="445" y="362" width="310" height="15" fill="#06060f"/>
    <rect x="445" y="386" width="310" height="20" fill="#06060f"/>
    <rect x="445" y="416" width="310" height="26" fill="#06060f"/>
    <!-- AIRPLANE -->
    <g transform="translate(600,250) rotate(27)">
      <path d="M0,-34 L3,-7 L36,3 L3.5,6 L5,14 L0,10 L-5,14 L-3.5,6 L-36,3 L-3,-7 Z"
            fill="#06060f" opacity="0.65"/>
    </g>
  </g>

  <!-- Horizon line (bright, with glow) -->
  <rect x="0" y="418" width="1200" height="4" fill="#fb7185" opacity="0.85"/>
  <rect x="0" y="416" width="1200" height="2" fill="#fde68a" opacity="0.4"/>
  <!-- Horizon side-glow -->
  <rect x="0" y="410" width="1200" height="20" fill="url(#floor-glow)" opacity="0.5"/>

  <!-- Grid floor (with floor glow) -->
  <rect x="0" y="422" width="1200" height="378" fill="url(#floor-glow)" opacity="0.3"/>
  <g stroke="#8b5cf6" opacity="0.45">
    <line x1="0" y1="450" x2="1200" y2="450" stroke-width="0.8"/>
    <line x1="0" y1="485" x2="1200" y2="485" stroke-width="0.7"/>
    <line x1="0" y1="525" x2="1200" y2="525" stroke-width="0.6"/>
    <line x1="0" y1="575" x2="1200" y2="575" stroke-width="0.5"/>
    <line x1="0" y1="635" x2="1200" y2="635" stroke-width="0.5"/>
    <line x1="0" y1="710" x2="1200" y2="710" stroke-width="0.4"/>
    <line x1="0" y1="790" x2="1200" y2="790" stroke-width="0.3"/>
  </g>
  <g stroke="#fb7185" opacity="0.18">
    <line x1="600" y1="422" x2="-50" y2="800" stroke-width="0.7"/>
    <line x1="600" y1="422" x2="150" y2="800" stroke-width="0.7"/>
    <line x1="600" y1="422" x2="300" y2="800" stroke-width="0.7"/>
    <line x1="600" y1="422" x2="450" y2="800" stroke-width="0.7"/>
    <line x1="600" y1="422" x2="600" y2="800" stroke-width="0.7"/>
    <line x1="600" y1="422" x2="750" y2="800" stroke-width="0.7"/>
    <line x1="600" y1="422" x2="900" y2="800" stroke-width="0.7"/>
    <line x1="600" y1="422" x2="1050" y2="800" stroke-width="0.7"/>
    <line x1="600" y1="422" x2="1250" y2="800" stroke-width="0.7"/>
  </g>

  <!-- Content (below horizon) -->
  <text x="600" y="520" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="40" font-weight="700" fill="#e4e4e7" text-anchor="middle">
    Welcome to CashPilot
  </text>
  <text x="600" y="558" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="15" fill="#a1a1aa" text-anchor="middle">
    Passive income from your machine, effortlessly.
  </text>
  <text x="600" y="590" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="13" fill="#71717a" text-anchor="middle">
    Deploys and monitors bandwidth-sharing, DePIN, and compute services using Docker.
  </text>

  <rect x="510" y="620" rx="6" ry="6" width="180" height="46" fill="#fb7185"/>
  <text x="600" y="649" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="15" font-weight="600" fill="#fff" text-anchor="middle">
    Get Started
  </text>

  <rect x="0" y="0" width="1200" height="2" fill="#fb7185" opacity="0.5"/>
  <rect x="0" y="798" width="1200" height="2" fill="#22d3ee" opacity="0.3"/>

  <text x="20" y="785" font-family="monospace" font-size="11" fill="#4a4a5a">
    G3: Wide sun with strong halo bloom. Horizon glow bleeds onto grid. Atmospheric.
  </text>
</svg>