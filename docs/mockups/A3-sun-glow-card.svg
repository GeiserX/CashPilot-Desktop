<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06060f"/>
      <stop offset="30%" stop-color="#0a0018"/>
      <stop offset="55%" stop-color="#150030"/>
      <stop offset="70%" stop-color="#200045"/>
      <stop offset="100%" stop-color="#06060f"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="25%" stop-color="#fbbf24"/>
      <stop offset="45%" stop-color="#fb923c"/>
      <stop offset="65%" stop-color="#e11d48"/>
      <stop offset="85%" stop-color="#9f1239"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="50%">
      <stop offset="25%" stop-color="#fbbf24" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#fb923c" stop-opacity="0.12"/>
      <stop offset="75%" stop-color="#e11d48" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <clipPath id="sun-clip"><circle cx="600" cy="200" r="130"/></clipPath>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="20" flood-color="#fb7185" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="1200" height="800" fill="url(#sky)"/>

  <!-- Stars -->
  <g fill="#fff">
    <circle cx="60" cy="25" r="1.2" opacity="0.8"/><circle cx="200" cy="50" r="0.7" opacity="0.5"/>
    <circle cx="1000" cy="30" r="1.1" opacity="0.7"/><circle cx="1150" cy="60" r="0.8" opacity="0.5"/>
    <circle cx="100" cy="110" r="0.5" opacity="0.3"/><circle cx="1100" cy="100" r="0.6" opacity="0.3"/>
  </g>

  <!-- Sun (top area) -->
  <circle cx="600" cy="200" r="190" fill="url(#halo)"/>
  <circle cx="600" cy="200" r="130" fill="url(#sun)"/>
  <g clip-path="url(#sun-clip)">
    <rect x="465" y="200" width="270" height="4" fill="#06060f"/>
    <rect x="465" y="210" width="270" height="5" fill="#06060f"/>
    <rect x="465" y="221" width="270" height="7" fill="#06060f"/>
    <rect x="465" y="234" width="270" height="9" fill="#06060f"/>
    <rect x="465" y="250" width="270" height="12" fill="#06060f"/>
    <rect x="465" y="270" width="270" height="16" fill="#06060f"/>
    <rect x="465" y="294" width="270" height="22" fill="#06060f"/>
    <!-- AIRPLANE -->
    <g transform="translate(600,158) rotate(27)">
      <path d="M0,-30 L3,-6 L32,2.5 L3,5.5 L4.5,13 L0,9 L-4.5,13 L-3,5.5 L-32,2.5 L-3,-6 Z"
            fill="#06060f" opacity="0.7"/>
    </g>
  </g>

  <!-- Horizon -->
  <rect x="0" y="318" width="1200" height="3" fill="#fb7185" opacity="0.6"/>

  <!-- Grid floor (behind card) -->
  <g stroke="#8b5cf6" opacity="0.3">
    <line x1="0" y1="350" x2="1200" y2="350" stroke-width="0.6"/>
    <line x1="0" y1="390" x2="1200" y2="390" stroke-width="0.5"/>
    <line x1="0" y1="440" x2="1200" y2="440" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke-width="0.4"/>
    <line x1="0" y1="575" x2="1200" y2="575" stroke-width="0.4"/>
    <line x1="0" y1="665" x2="1200" y2="665" stroke-width="0.3"/>
    <line x1="0" y1="770" x2="1200" y2="770" stroke-width="0.3"/>
  </g>
  <g stroke="#fb7185" opacity="0.1">
    <line x1="600" y1="321" x2="-50" y2="800" stroke-width="0.5"/>
    <line x1="600" y1="321" x2="150" y2="800" stroke-width="0.5"/>
    <line x1="600" y1="321" x2="350" y2="800" stroke-width="0.5"/>
    <line x1="600" y1="321" x2="600" y2="800" stroke-width="0.5"/>
    <line x1="600" y1="321" x2="850" y2="800" stroke-width="0.5"/>
    <line x1="600" y1="321" x2="1050" y2="800" stroke-width="0.5"/>
    <line x1="600" y1="321" x2="1250" y2="800" stroke-width="0.5"/>
  </g>

  <!-- Floating glass card with content -->
  <rect x="350" y="380" rx="12" ry="12" width="500" height="280"
        fill="rgba(10,8,20,0.75)" stroke="rgba(139,92,246,0.25)" stroke-width="1"
        filter="url(#card-shadow)"/>
  <!-- Card inner border glow -->
  <rect x="354" y="384" rx="10" ry="10" width="492" height="272"
        fill="none" stroke="rgba(251,113,133,0.08)" stroke-width="1"/>

  <text x="600" y="445" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="36" font-weight="700" fill="#e4e4e7" text-anchor="middle">
    Welcome to CashPilot
  </text>
  <text x="600" y="482" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="15" fill="#a1a1aa" text-anchor="middle">
    Passive income from your machine, effortlessly.
  </text>
  <text x="600" y="520" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="13" fill="#71717a" text-anchor="middle">
    Deploys and monitors bandwidth-sharing, DePIN,
  </text>
  <text x="600" y="540" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="13" fill="#71717a" text-anchor="middle">
    and compute services using Docker.
  </text>

  <rect x="510" y="575" rx="6" ry="6" width="180" height="46" fill="#fb7185"/>
  <text x="600" y="604" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="15" font-weight="600" fill="#fff" text-anchor="middle">
    Get Started
  </text>

  <rect x="0" y="0" width="1200" height="2" fill="#fb7185" opacity="0.5"/>
  <rect x="0" y="798" width="1200" height="2" fill="#22d3ee" opacity="0.3"/>

  <text x="20" y="785" font-family="monospace" font-size="11" fill="#4a4a5a">
    A3: Sun top, floating glassmorphism card below with content. Card has rose shadow glow.
  </text>
</svg>