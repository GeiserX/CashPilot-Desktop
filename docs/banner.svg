<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" width="1200" height="300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000010"/>
      <stop offset="40%" stop-color="#0d0025"/>
      <stop offset="100%" stop-color="#000010"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="30%" stop-color="#fb923c"/>
      <stop offset="60%" stop-color="#e11d48"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="pk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#fb7185"/>
    </linearGradient>
    <linearGradient id="cy" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="wh" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e4e4e7"/>
      <stop offset="100%" stop-color="#a1a1aa"/>
    </linearGradient>
    <filter id="pg"><feGaussianBlur stdDeviation="6" result="b"/><feFlood flood-color="#f43f5e" flood-opacity="0.5" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="cg"><feGaussianBlur stdDeviation="3" result="b"/><feFlood flood-color="#06b6d4" flood-opacity="0.4" result="c"/><feComposite in="c" in2="b" operator="in" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="sg"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <clipPath id="sc"><circle cx="1020" cy="150" r="90"/></clipPath>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="#fff" filter="url(#sg)">
    <circle cx="30" cy="25" r="1.2" opacity="0.8"/><circle cx="85" cy="60" r="0.7" opacity="0.5"/>
    <circle cx="120" cy="15" r="1" opacity="0.7"/><circle cx="180" cy="80" r="0.8" opacity="0.4"/>
    <circle cx="230" cy="40" r="1.3" opacity="0.9"/><circle cx="290" cy="95" r="0.6" opacity="0.3"/>
    <circle cx="340" cy="25" r="0.9" opacity="0.6"/><circle cx="410" cy="70" r="1.1" opacity="0.7"/>
    <circle cx="460" cy="35" r="0.7" opacity="0.5"/><circle cx="520" cy="90" r="1" opacity="0.4"/>
    <circle cx="570" cy="18" r="1.2" opacity="0.8"/><circle cx="640" cy="55" r="0.6" opacity="0.3"/>
    <circle cx="700" cy="30" r="1.1" opacity="0.7"/><circle cx="760" cy="85" r="0.8" opacity="0.5"/>
    <circle cx="830" cy="20" r="0.9" opacity="0.6"/><circle cx="880" cy="65" r="0.7" opacity="0.4"/>
    <circle cx="950" cy="35" r="1" opacity="0.6"/><circle cx="1020" cy="80" r="0.8" opacity="0.4"/>
    <circle cx="1070" cy="25" r="1.3" opacity="0.9"/><circle cx="1130" cy="50" r="0.7" opacity="0.5"/>
    <circle cx="1180" cy="15" r="1" opacity="0.7"/>
    <circle cx="55" cy="110" r="0.6" opacity="0.3"/><circle cx="160" cy="120" r="0.8" opacity="0.4"/>
    <circle cx="310" cy="115" r="0.7" opacity="0.3"/><circle cx="490" cy="125" r="0.9" opacity="0.4"/>
    <circle cx="650" cy="108" r="0.6" opacity="0.3"/><circle cx="1150" cy="100" r="0.7" opacity="0.3"/>
  </g>

  <!-- Sun — pushed right to avoid text overlap -->
  <circle cx="1020" cy="150" r="90" fill="url(#sun)" opacity="0.8"/>
  <g clip-path="url(#sc)">
    <rect x="925" y="150" width="190" height="4" fill="#000010"/>
    <rect x="925" y="160" width="190" height="6" fill="#000010"/>
    <rect x="925" y="172" width="190" height="8" fill="#000010"/>
    <rect x="925" y="186" width="190" height="11" fill="#000010"/>
    <rect x="925" y="204" width="190" height="16" fill="#000010"/>
    <g transform="translate(1020,116) rotate(30)">
      <path d="M0,-32 L3,-7 L34,2 L3.5,5.5 L4.5,14 L0,9 L-4.5,14 L-3.5,5.5 L-34,2 L-3,-7 Z"
            fill="#000010" opacity="0.65"/>
    </g>
  </g>

  <!-- Grid -->
  <g stroke="#06b6d4" stroke-width="0.5">
    <line x1="0" y1="230" x2="1200" y2="230" opacity="0.2"/>
    <line x1="0" y1="248" x2="1200" y2="248" opacity="0.14"/>
    <line x1="0" y1="266" x2="1200" y2="266" opacity="0.09"/>
    <line x1="0" y1="284" x2="1200" y2="284" opacity="0.05"/>
    <line x1="600" y1="225" x2="0" y2="300" opacity="0.07"/>
    <line x1="600" y1="225" x2="200" y2="300" opacity="0.07"/>
    <line x1="600" y1="225" x2="400" y2="300" opacity="0.07"/>
    <line x1="600" y1="225" x2="600" y2="300" opacity="0.07"/>
    <line x1="600" y1="225" x2="800" y2="300" opacity="0.07"/>
    <line x1="600" y1="225" x2="1000" y2="300" opacity="0.07"/>
    <line x1="600" y1="225" x2="1200" y2="300" opacity="0.07"/>
  </g>

  <!-- Title: "CashPilot" large + "Desktop" as styled suffix -->
  <text x="80" y="165" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="90" font-weight="900" fill="url(#pk)" letter-spacing="-2" filter="url(#pg)">
    CashPilot
  </text>
  <text x="80" y="165" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="90" font-weight="900" fill="none" stroke="#fff" stroke-width="0.3" letter-spacing="-2" opacity="0.2">
    CashPilot
  </text>
  <text x="640" y="165" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="50" font-weight="300" fill="url(#wh)" letter-spacing="1" opacity="0.9">
    Desktop
  </text>

  <text x="88" y="198" font-family="Inter, -apple-system, Arial, sans-serif"
        font-size="17" font-weight="600" fill="url(#cy)" letter-spacing="6" filter="url(#cg)">
    MONITOR YOUR PASSIVE INCOME FLEET
  </text>

  <rect x="0" y="0" width="1200" height="2" fill="url(#pk)" filter="url(#pg)"/>
  <rect x="0" y="298" width="1200" height="2" fill="url(#cy)" filter="url(#cg)"/>
</svg>
