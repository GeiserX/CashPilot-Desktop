codecov:
  require_ci_to_pass: true

coverage:
  precision: 2
  round: down
  range: "60...90"
  status:
    project:
      default:
        # Total coverage across the (mostly UI-glue) codebase is informational —
        # it reports but does not block. New code is gated via `patch` below.
        target: auto
        threshold: 2%
        informational: true
    patch:
      default:
        # New/changed code must be reasonably covered.
        target: 80%
        threshold: 5%

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

ignore:
  - "frontend/**"
  - "build/**"
  - "vendor/**"
  - "**/*_test.go"
  - "**/testdata/**"
  - "main.go"          # Wails bootstrap glue
  - "app.go"           # Wails-bound API surface (thin glue over internal/*)
  - "daemon.go"        # --daemon headless bootstrap (counterpart of main.go; smoke-tested, not unit-tested)
  - "tray_darwin.go"   # cgo / AppKit platform glue
  - "tray_other.go"    # non-darwin tray stub
