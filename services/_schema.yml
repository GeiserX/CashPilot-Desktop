# CashPilot Service Definition Schema
# Each YAML file in services/ defines one income service.
# This is the SINGLE SOURCE OF TRUTH — README, web UI, and guides all derive from these files.

# name: Human-readable service name
# slug: URL/container-safe identifier (lowercase, hyphens)
# category: bandwidth | depin | storage | compute
# status: active | beta | broken | dead
# website: Main URL
# description: One paragraph description
# short_description: One line (for tables)

# referral:
#   signup_url: Full signup URL with referral code already embedded
#   bonus:
#     referrer: What the referrer gets
#     referee: What the new user gets

# docker:
#   image: Docker Hub image
#   platforms: [linux/amd64, linux/arm64]
#   env:
#     - key: ENV_VAR_NAME
#       label: "Human label"
#       required: true/false
#       secret: true/false
#       description: "Help text"
#       default: "" (optional)
#   ports: ["port:port"]
#   volumes: ["host:container"]
#   command: "" (optional override)
#   network_mode: "" (optional, e.g. "host")
#   cap_add: [] (optional)
#   stop_timeout: 30 (optional, seconds to wait before SIGKILL on stop — default 30)
#   resources:  (optional, per-container limits applied at creation on HostConfig)
#     mem_limit: "768m"  (hard memory ceiling; Docker size string like "256m"/"2g". Omit = unlimited)
#     mem_reservation: "256m"  (optional soft memory limit; Docker size string)
#     oom_score_adj: -100  (optional OOM-killer priority, -1000..1000; negative protects the
#                           container, positive makes the kernel kill it first under memory pressure)
#   setup: "" (optional, one-time setup instructions/commands to run before first deploy)

# native:  (optional, additive — how to run this service as a supervised NATIVE child
#           process with no container runtime. A service may declare docker:, native:,
#           or both; native is preferred on hosts that have a matching binary.)
#   binaries:  (one pinned download per OS/arch)
#     - os: darwin        # darwin | linux | windows (matches Go's runtime.GOOS)
#       arch: arm64       # amd64 | arm64 (matches Go's runtime.GOARCH)
#       url: "https://.../myst_darwin_arm64.tar.gz"  # MUST be HTTPS
#       sha256: "<64-hex>"  # SHA-256 of the downloaded artifact; MANDATORY. The
#                           # downloader fails closed on mismatch or a missing/invalid
#                           # value (a placeholder like "TODO-verify" never executes).
#       archive: tar.gz   # tar.gz | zip | none  (none = the url IS the raw binary)
#       bin: "myst"       # path to the executable inside the archive (e.g. "myst.exe")
#   command: ""  (arg template for the binary; tokenized then ${VAR}-substituted with
#                 env, argv-only/no-shell — same safe path as docker.command)
#   env: []  (same shape as docker.env; resolved + passed to the process environment)

# requirements:
#   residential_ip: true/false
#   vps_ip: true/false  (default: opposite of residential_ip)
#   devices_per_account: 0  (0 = unlimited)
#   devices_per_ip: 1  (0 = unlimited)
#   note: ""  (footnote text for special cases in README table)
#   note_column: ""  (which column footnote applies to: vps_ip, devices_per_ip)
#   min_bandwidth: ""
#   gpu: false
#   min_storage: ""

# payment:
#   methods: [paypal, crypto, bank, giftcard]
#   crypto_token: ""  (specific token if different from currency, e.g. "SOL", "USDT")
#   minimum_payout: "$20"
#   currency: USD
#   frequency: "On request" | "Monthly" | "Weekly"

# earnings:
#   monthly_low: 2
#   monthly_high: 5
#   currency: USD
#   per: "device" | "TB" | "GPU-hour"
#   notes: ""

# cashout:
#   method: redirect | api | manual
#     - redirect: user clicks through to service dashboard to request payout
#     - api: CashPilot can trigger payout via API (rare)
#     - manual: instructions only (e.g. crypto claim, no dashboard)
#   dashboard_url: "https://service.com/dashboard/earnings"
#   min_amount: 20 (numeric, derived from payment.minimum_payout)
#   currency: USD
#   notes: "Additional cashout instructions or caveats"

# platforms: [windows, macos, linux, android, ios, docker, browser_extension]

# collector:
#   type: api | scrape | manual
#   notes: "Implementation hints for the earnings collector"
