name: Repocket
slug: repocket
category: bandwidth
status: active
website: https://repocket.com
description: >
  Repocket lets you earn passive income by sharing your unused internet bandwidth.
  Residential IPs earn the most; VPS/datacenter IPs are accepted at lower rates.
  Max 5 devices and 5 active sessions per account. Authenticates via Firebase
  using email and password. The Docker image uses environment variables directly.
short_description: Bandwidth sharing - max 5 devices, email/password auth

referral:
  signup_url: "https://repocket.com/"

docker:
  image: repocket/repocket
  platforms: [linux/amd64, linux/arm64]
  env:
    - key: REPOCKET_EMAIL
      label: "Email"
      required: true
      secret: false
      description: "Your Repocket account email"
    - key: REPOCKET_PASSWORD
      label: "Password"
      required: true
      secret: true
      description: "Your Repocket account password (used for Firebase auth)"
  ports: []
  volumes: []
  command: ""
  network_mode: ""
  privileged: false

requirements:
  residential_ip: true
  devices_per_account: 5
  devices_per_ip: 2
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [paypal, crypto]
  minimum_payout: "$20"
  currency: USD
  frequency: "On request"

earnings:
  monthly_low: 0
  monthly_high: 4
  currency: USD
  per: "device"
  notes: "Residential IPs earn more. VPS/datacenter IPs accepted but at lower rates."

cashout:
  method: redirect
  dashboard_url: "https://app.repocket.com/dashboard"
  min_amount: 20.0
  currency: USD

platforms: [docker, windows, macos, linux, android]

collector:
  type: api
  notes: "Firebase auth via email/password. Per-device earnings visible."
