name: MystNodes
slug: mysterium
category: bandwidth
status: active
website: https://mystnodes.com
description: >
  MystNodes (Mysterium Network) is a decentralized VPN and proxy network built on
  blockchain technology. You earn MYST tokens by running a node that provides VPN,
  proxy, and data scraping services to users. Requires NET_ADMIN capability and
  host networking for full functionality. Includes a built-in web UI for node
  management. Works on both residential and VPS connections.
short_description: Decentralized VPN node - blockchain-based, works on VPS

referral:
  signup_url: "https://mystnodes.co/?referral_code=do7v7YOoBBpbOstKQovX2pUvZYKia4ZhH3QIdNtE"

docker:
  image: "mysteriumnetwork/myst@sha256:1b68b8336112567a2b4596eccebd53cb704bfa37630dd3e2aef63d8a0eca2b2a"
  platforms: [linux/amd64, linux/arm64]
  env: []
  ports:
    - "4449:4449"
  volumes:
    - "mysterium-data:/var/lib/mysterium-node"
  command: "--ui.address=127.0.0.1 --tequilapi.address=127.0.0.1 service --agreed-terms-and-conditions"
  network_mode: "host"
  cap_add: [NET_ADMIN]
  privileged: false
  resources:
    mem_limit: "768m"
    oom_score_adj: -100

# Native (no-Docker) execution: run the official Mysterium headless node binary as a
# supervised child process. Pinned to release 1.38.5; sha256 is the SHA-256 of each
# published release artifact. There is no linux/arm64 tarball upstream (only .deb), so
# arm64 Linux hosts fall back to the docker: image above. The launch args mirror the
# docker command (loopback UI + Tequila API on :4449, terms accepted) so the earnings
# collector at http://localhost:4449/tequilapi still works unchanged.
native:
  binaries:
    - os: darwin
      arch: amd64
      url: "https://github.com/mysteriumnetwork/node/releases/download/1.38.5/myst_darwin_amd64.tar.gz"
      sha256: "979d37b9d29d2a078fab1afeeb2adb22b8a7d1cba0df6b655a23da7938bb632d"
      archive: tar.gz
      bin: "myst"
    - os: darwin
      arch: arm64
      url: "https://github.com/mysteriumnetwork/node/releases/download/1.38.5/myst_darwin_arm64.tar.gz"
      sha256: "f8f96ec89f91d19c4e70cd8d7a4009f7a8422f818a50c2ba26b851fa39d0a3cd"
      archive: tar.gz
      bin: "myst"
    - os: linux
      arch: amd64
      url: "https://github.com/mysteriumnetwork/node/releases/download/1.38.5/myst_linux_amd64.tar.gz"
      sha256: "79b0aa1ca846cfa02ff8a814828a18d9fba739698295054e13cafb6a74907554"
      archive: tar.gz
      bin: "myst"
    - os: windows
      arch: amd64
      url: "https://github.com/mysteriumnetwork/node/releases/download/1.38.5/myst_windows_amd64.zip"
      sha256: "3ebecba44637462351ebf8fe62794db83088345fb5f8dd75a455bea0f762fc44"
      archive: zip
      bin: "myst.exe"
  command: "--ui.address=127.0.0.1 --tequilapi.address=127.0.0.1 service --agreed-terms-and-conditions"
  env: []

requirements:
  residential_ip: false
  devices_per_ip: 0
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [crypto]
  minimum_payout: "4 MYST"
  currency: MYST
  frequency: "Auto-settle every 4 MYST to your beneficiary wallet"

earnings:
  monthly_low: 0
  monthly_high: 10
  currency: USD
  per: "device"
  notes: "Earnings in MYST tokens. Residential IPs earn significantly more. Node WebUI at port 4449 for management. VPS accepted. Port forwarding UDP 56000-56100 strongly recommended -- without it, nodes get Strict NAT status and many VPN sessions fail, severely reducing income. Important: after first run, set your beneficiary (settlement) wallet via the node WebUI or CLI to match your mystnodes.com account -- this links on-chain earnings to your cloud dashboard."

cashout:
  method: auto
  dashboard_url: "https://my.mystnodes.com/rewards"
  min_amount: 4.0
  currency: MYST
  notes: "Auto-settles every 4 MYST to your beneficiary wallet. No manual cashout needed. Visit Rewards page to claim bonus MYST."

platforms: [docker, windows, macos, linux, android, browser-extension]

collector:
  type: api
  notes: "Tequila API at http://localhost:4449/tequilapi/settlement/total-fees. Returns MYST in wei (10^18). No auth needed."
