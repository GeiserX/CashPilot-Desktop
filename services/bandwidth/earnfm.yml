name: Earn.fm
slug: earnfm
category: bandwidth
status: active
website: https://earn.fm
description: >
  Earn.fm pays you for sharing your internet bandwidth. Earnings collector
  uses email/password auth via Supabase. Lightweight Docker image with
  straightforward deployment (Docker client uses separate UUID token).
short_description: Bandwidth sharing - email/password auth, lightweight client

referral:
  signup_url: "https://earn.fm/ref/GEISYB91"

docker:
  image: earnfm/earnfm-client
  platforms: [linux/amd64, linux/arm64]
  env:
    - key: EARNFM_TOKEN
      label: "API Key"
      required: true
      secret: true
      description: "Log in at <a href=\"https://app.earn.fm\">app.earn.fm</a> → click your profile icon (top right) → Account Settings → copy the API Key (UUID format)"
  ports: []
  volumes: []
  command: ""
  network_mode: ""
  privileged: false

requirements:
  residential_ip: true
  vps_ip: true
  min_bandwidth: ""
  gpu: false
  min_storage: ""

payment:
  methods: [crypto]
  minimum_payout: "$15"
  currency: USD
  frequency: "On request"

earnings:
  monthly_low: 0
  monthly_high: 3
  currency: USD
  per: "device"
  notes: "Relatively new platform. Earnings vary by location and bandwidth availability."

cashout:
  method: redirect
  dashboard_url: "https://app.earn.fm/#/payout"
  min_amount: 15.0
  currency: USD

platforms: [docker, linux]

collector:
  type: api
  notes: "Supabase email/password auth. Docker client uses separate EARNFM_TOKEN (UUID) for bandwidth sharing only."
